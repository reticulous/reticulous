<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <!-- Rounded tile (transparent corners exercise the RGB565A8 alpha channel) -->
  <rect x="4" y="4" width="120" height="120" rx="26" fill="#2f7d32"/>
  <!-- Globe: outline, equator + tropics, and two meridians -->
  <g stroke="#ffffff" stroke-width="5" fill="none" opacity="0.97">
    <circle cx="64" cy="64" r="38"/>
    <!-- parallels (equator + two latitude lines) -->
    <line x1="26" y1="64" x2="102" y2="64"/>
    <ellipse cx="64" cy="64" rx="38" ry="14"/>
    <!-- meridians -->
    <ellipse cx="64" cy="64" rx="14" ry="38"/>
    <line x1="64" y1="26" x2="64" y2="102"/>
  </g>
</svg>
