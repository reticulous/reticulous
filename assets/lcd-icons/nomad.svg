<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Nomad Network = a simple stylized blue/green globe. Filled disc so it
       stands out on the dark dock (like the maps tile) and rasterizes for the
       LCD tile. No <mask> (cairosvg mis-handles those). -->
  <circle cx="32" cy="32" r="26" fill="#1565c0"/>
  <path d="M14 24 q9 -5 17 -1 q-1 6 -7 8 q-8 2 -10 -7 z" fill="#43a047"/>
  <path d="M36 33 q11 -3 13 6 q-3 9 -13 7 q-5 -7 0 -13 z" fill="#43a047"/>
  <g fill="none" stroke="#90caf9" stroke-width="1.5" opacity="0.55">
    <circle cx="32" cy="32" r="26"/>
    <ellipse cx="32" cy="32" rx="12" ry="26"/>
    <line x1="6" y1="32" x2="58" y2="32"/>
  </g>
</svg>
