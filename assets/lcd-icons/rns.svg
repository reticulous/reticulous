<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <!-- Rounded tile (transparent corners exercise the RGB565A8 alpha channel) -->
  <rect x="4" y="4" width="120" height="120" rx="26" fill="#0e7c86"/>
  <!-- Reticulum-ish mesh: a hub linked to peer nodes -->
  <g stroke="#ffffff" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.95">
    <line x1="64" y1="64" x2="34" y2="34"/>
    <line x1="64" y1="64" x2="96" y2="36"/>
    <line x1="64" y1="64" x2="32" y2="92"/>
    <line x1="64" y1="64" x2="94" y2="94"/>
  </g>
  <g fill="#ffffff">
    <circle cx="64" cy="64" r="13"/>
    <circle cx="34" cy="34" r="8"/>
    <circle cx="96" cy="36" r="8"/>
    <circle cx="32" cy="92" r="8"/>
    <circle cx="94" cy="94" r="8"/>
  </g>
</svg>
