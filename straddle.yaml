# reticulous/reticulous — the buildable that assembles a Reticulum / LXMF /
# Nomad Network device image.
#
# It carries NO firmware or board HAL of its own. It pulls in the reticulous
# mesh straddles + the spangap IP/web platform via additional_installs below,
# ships the Quasar browser SPA (web-interface/), the LittleFS data image (data/)
# and the LCD launcher icons (assets/lcd-icons/); its main/ is just the build-
# generated app_main + start/init dispatchers.
#
# Build it WITH a board straddle — the board supplies the pin maps, the board
# bring-up hooks, and the hardware kconfig (flash size, PSRAM mode, display):
#   spangap build reticulous/reticulous --with reticulous/hw-tdeck
#   spangap build reticulous/reticulous --with reticulous/hw-heltecv4
schema_version: 1
name: reticulous/reticulous
prefix: reticulous
version: 0.0.0
# Firmware identity (immutable; exposed read-only to the browser as fw.*).
# reticulous is the built straddle here, so it wins these over every dep.
stub: reticulous
display_name: Reticulous
banner: Reticulum mesh networking for the masses!
default_hostname: reticulous
firmware: esp-idf
browser: web-interface
platforms: [idf]
# The kitchen sink, in one place: the full reticulous mesh + the spangap IP/web
# platform. All default-on and droppable with `spangap build --without <name>`
# (the cascade takes hard dependents with it). Notes:
#   - The remote-access services (ACME / UPnP / WireGuard / DuckDNS) are NOT
#     listed here — spangap-net additional-installs them, so requiring net is
#     enough.
#   - The on-device LCD UI is NOT listed here either — it rides on the board: a
#     board with a screen (hw-tdeck) additional-installs spangap-lcd itself, so
#     a screenless board (hw-heltecv4) builds headless with no extra flags.
additional_installs:
  - reticulous/rns
  - reticulous/iface-lora
  - reticulous/iface-tcp
  - reticulous/iface-auto
  - reticulous/iface-espnow
  - reticulous/lxmf
  - reticulous/nomad
  - reticulous/maps
  - spangap/spangap-net
  - spangap/spangap-web
# OTA intentionally omitted (not ready, conceptually or otherwise): no ota
# straddle, no OTA pubkey shipped. The partition layout is generated by the
# build (from flash-size / app-% / whether ota is staged); nothing here
# hand-owns its contents.
